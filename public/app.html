<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Minutes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="app" class="workspace">
        <header class="topbar">
          <div class="brand-block">
            <a class="brand-link" href="/" data-i18n="app.title">Meeting Minutes</a>
            <p id="statusText" class="status-text" data-i18n="status.idle">대기 중</p>
          </div>
          <div class="topbar-actions">
            <div class="locale-field" data-i18n-aria-label="form.uiLanguage" role="group">
              <button class="locale-toggle" type="button" data-locale="ko">KO</button>
              <button class="locale-toggle" type="button" data-locale="en">EN</button>
            </div>
            <span id="timer" class="timer">00:00</span>
            <button id="startButton" class="primary" data-i18n="actions.start">녹음 시작</button>
            <button id="stopButton" class="danger" disabled data-i18n="actions.stop">중지</button>
          </div>
        </header>

        <section class="meeting-form" data-i18n-aria-label="aria.meetingDetails">
          <label>
            <span data-i18n="form.meetingTitle">회의 제목</span>
            <input id="meetingTitle" type="text" />
          </label>
          <label>
            <span data-i18n="form.participants">참석자</span>
            <input
              id="participants"
              type="text"
              data-i18n-placeholder="placeholders.participants"
              placeholder="홍길동, Jane, Alex"
            />
          </label>
          <label>
            <span data-i18n="form.languageHint">언어 힌트</span>
            <select id="language">
              <option value="auto" data-i18n="language.auto">자동</option>
              <option value="ko" data-i18n="language.ko">한국어</option>
              <option value="en" data-i18n="language.en">English</option>
              <option value="ja" data-i18n="language.ja">日本語</option>
              <option value="zh" data-i18n="language.zh">中文</option>
            </select>
          </label>
          <label>
            <span data-i18n="form.microphoneEnvironment">마이크 환경</span>
            <select id="noiseReduction">
              <option value="far_field" data-i18n="microphone.farField">회의실/노트북</option>
              <option value="near_field" data-i18n="microphone.nearField">헤드셋/가까운 마이크</option>
            </select>
          </label>
          <label class="device-field">
            <span data-i18n="form.microphone">마이크</span>
            <span class="input-with-button">
              <select id="audioInput">
                <option value="" data-i18n="devices.defaultMicrophone">기본 마이크</option>
              </select>
              <button
                id="refreshDevicesButton"
                class="secondary"
                type="button"
                data-i18n="actions.refresh"
              >
                새로고침
              </button>
            </span>
          </label>
        </section>

        <section class="split">
          <article class="panel transcript-panel">
            <div class="panel-header">
              <h2 data-i18n="panels.transcript">실시간 Transcript</h2>
              <button id="clearTranscriptButton" class="secondary" data-i18n="actions.clear">비우기</button>
            </div>
            <div id="transcript" class="transcript" aria-live="polite"></div>
          </article>

          <article id="minutes" class="panel">
            <div class="panel-header">
              <h2 data-i18n="panels.minutes">회의록</h2>
              <div class="panel-actions">
                <button id="summarizeButton" class="secondary" data-i18n="actions.summarize">
                  요약 생성
                </button>
                <button id="downloadButton" class="secondary" disabled data-i18n="actions.download">
                  내보내기
                </button>
              </div>
            </div>
            <div id="minutesContent" class="minutes empty-state" data-i18n="minutes.empty">
              회의가 끝나면 요약을 생성하세요.
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
